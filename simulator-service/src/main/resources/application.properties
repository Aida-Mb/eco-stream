# ── Application ──────────────────────────────────────────────
server.port=8081
spring.application.name=simulator-service

# ── Config Server ─────────────────────────────────────────────
spring.config.import=optional:configserver:http://localhost:8888

# ── Eureka ────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ── Base de données H2 ────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:simulatordb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── URL de l'Ingestion Service ────────────────────────────────
# En local : via URL directe
# En Docker : remplacer par http://ingestion-service:8082
ingestion.service.url=http://localhost:8082

# ── Paramètres de simulation (modifiables sans redémarrer) ────
simulator.default.meter-count=5
simulator.default.interval-ms=2000
simulator.min-consumption=0.5
simulator.max-consumption=15.0
