spring:
  application:
    name: billing-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: jdbc:h2:file:./data/billing-db
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true

server:
  port: 8083

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

#tarification dynamique (on pweut modifier sans redemarrer)

tariff:
  peak-rate: 126 #FCFa/Kwh en heures pleines (entre 8h et 20h)
  off-peak-rate: 100 #FCFa/Kwh en heures creuses (la nuit)
  peak-start-hour: 8
  peak-end-hour: 20
  anomaly-threshold: 3.0 #multiplicateur pour detecter anomalie de consommation





